# ============================================================
# ProxyRules — 每日自动同步与发布
# ============================================================
# 触发条件:
#   1. 定时: 北京时间每天早上 8:00 (UTC 0:00)
#   2. 手动: workflow_dispatch (GitHub UI 按钮触发)
#   3. 推送: 推送到 main/master 分支时 (仅 config/scripts/workflow 变更)
# ============================================================

name: Sync & Release Rules

on:
  schedule:
    - cron: "0 0 * * *"

  workflow_dispatch:
    inputs:
      publish:
        description: "是否发布到 release 分支"
        type: boolean
        default: true

  push:
    branches:
      - main
      - master
    paths:
      - "config/**"
      - "scripts/**"
      - ".github/workflows/sync.yml"

permissions:
  contents: write
  actions: write

concurrency:
  group: sync-release
  cancel-in-progress: true

jobs:

  # ==========================================================
  # Job 1: 抓取 + 清洗规则 (唯一的生产者)
  # ==========================================================
  fetch-and-filter:
    name: Fetch & Filter
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout 仓库
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: "scripts/requirements.txt"

      - name: 安装 Python 依赖
        run: pip install -r scripts/requirements.txt

      - name: 运行抓取与清洗
        timeout-minutes: 10
        run: python scripts/fetch_and_filter.py

      - name: 上传 output/ (供后续 job 使用)
        uses: actions/upload-artifact@v4
        with:
          name: output-txt
          path: output/
          retention-days: 1

      - name: 打印统计
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "📊 规则抓取统计"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          for f in output/*.txt; do
            echo "  $(basename $f): $(grep -vc '^#' $f) 条"
          done
          ls -lh output/*.txt


  # ==========================================================
  # Job 2: 编译所有产物 (MRS + Shadowrocket)
  # ==========================================================
  build-all:
    name: Build All (MRS + Shadowrocket)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: fetch-and-filter

    steps:
      - name: Checkout 仓库
        uses: actions/checkout@v4

      - name: 下载 output 产物
        uses: actions/download-artifact@v4
        with:
          name: output-txt
          path: output/

      - name: 安装 Python 依赖
        run: pip install requests PyYAML

      # --- Mihomo 编译 ---
      - name: 下载 Mihomo 核心
        run: |
          MIHOMO_VER="v1.19.3"
          MIHOMO_URL="https://github.com/MetaCubeX/mihomo/releases/download/${MIHOMO_VER}/mihomo-linux-amd64-${MIHOMO_VER}.gz"
          curl -sL "$MIHOMO_URL" -o mihomo.gz
          gunzip mihomo.gz
          chmod +x mihomo
          ./mihomo convert-ruleset 2>&1 | head -1 || true
          echo "✅ Mihomo ready"

      - name: 编译 MRS 二进制
        run: |
          mkdir -p build
          ./mihomo convert-ruleset domain  text output/direct_domain.txt  build/direct_domain.mrs
          ./mihomo convert-ruleset ipcidr  text output/direct_ip.txt      build/direct_ip.mrs
          ./mihomo convert-ruleset ipcidr  text output/private_ip.txt     build/private_ip.mrs
          ./mihomo convert-ruleset domain  text output/private_domain.txt build/private_domain.mrs
          ./mihomo convert-ruleset domain  text output/reject.txt         build/reject.mrs
          # 为每个 .mrs 文件追加时间戳注释 (Zstandard 尾部兼容)
          # 确保 MRS blob 每次更新，与 TXT 保持时间戳一致
          SYNC_TS=$(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S (北京时间)')
          for mrs in build/*.mrs; do
            printf '\n# synced: %s\n' "$SYNC_TS" >> "$mrs"
          done
          echo ""
          echo "📦 MRS 产物:"
          ls -lh build/*.mrs

      # --- Shadowrocket 模块 ---
      - name: 生成 Shadowrocket .module
        run: |
          python scripts/generate_sr.py
          echo "📦 SGModule 产物:"
          ls -lh build/Shadowrocket/

      # --- 把 .txt 也复制到 build/，方便发布时一起拿 ---
      - name: 整理 build/ 目录
        run: |
          cp output/*.txt build/
          echo ""
          echo "📦 build/ 完整产物:"
          find build -type f | sort

      # --- 上传整个 build/ 给 publish job ---
      - name: 上传 build 产物
        uses: actions/upload-artifact@v4
        with:
          name: build-all
          path: build/
          retention-days: 1


  # ==========================================================
  # Job 3: 发布到 Release
  # ==========================================================
  publish:
    name: Publish to Release
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: build-all
    if: |
      (github.event_name == 'schedule') ||
      (github.event_name == 'push') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.publish == 'true')

    steps:
      - name: Checkout 仓库 (release 分支)
        uses: actions/checkout@v4
        with:
          ref: release

      - name: 下载 build 产物
        uses: actions/download-artifact@v4
        with:
          name: build-all
          path: dist

      - name: 发布到 release 分支
        run: |
          echo "📁 下载的产物:"
          find dist -type f | sort

          # 清空根目录
          git rm -rf --ignore-unmatch .

          # 复制所有产物到根目录 (保留子目录结构)
          cp -r dist/* .
          rm -rf dist

          # 删除 .txt 中间文件，release 只发布 .mrs + .module
          rm -f ./*.txt

          echo ""
          echo "📦 待发布文件:"
          find . -type f -not -path './.git/*' | sort

          git add -A

          TIMESTAMP=$(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S')

          if git diff --staged --quiet; then
            echo "✅ 无变更，跳过提交"
          else
            git -c user.name="github-actions[bot]" \
                -c user.email="github-actions[bot]@users.noreply.github.com" \
                commit -m "🔄 Sync: $TIMESTAMP (北京时间)"
            git push origin release --force
            echo "✅ 已推送到 release 分支"
          fi

      - name: 发布摘要
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "📦 发布完成"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""
          echo "文本规则:"
          echo "  https://raw.githubusercontent.com/${{ github.repository }}/release/direct_domain.txt"
          echo "  https://raw.githubusercontent.com/${{ github.repository }}/release/direct_ip.txt"
          echo "  https://raw.githubusercontent.com/${{ github.repository }}/release/private_ip.txt"
          echo "  https://raw.githubusercontent.com/${{ github.repository }}/release/private_domain.txt"
          echo "  https://raw.githubusercontent.com/${{ github.repository }}/release/reject.txt"
          echo ""
          echo "MRS 二进制:"
          echo "  https://raw.githubusercontent.com/${{ github.repository }}/release/direct_domain.mrs"
          echo "  https://raw.githubusercontent.com/${{ github.repository }}/release/direct_ip.mrs"
          echo "  https://raw.githubusercontent.com/${{ github.repository }}/release/private_ip.mrs"
          echo "  https://raw.githubusercontent.com/${{ github.repository }}/release/private_domain.mrs"
          echo "  https://raw.githubusercontent.com/${{ github.repository }}/release/reject.mrs"
          echo ""
          echo "Shadowrocket:"
          echo "  https://raw.githubusercontent.com/${{ github.repository }}/release/Shadowrocket/direct.module"
          echo "  https://raw.githubusercontent.com/${{ github.repository }}/release/Shadowrocket/reject.module"
